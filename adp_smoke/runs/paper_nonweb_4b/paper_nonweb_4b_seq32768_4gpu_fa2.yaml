### model
model_name_or_path: Qwen/Qwen3.5-4B-Base
trust_remote_code: true
enable_liger_kernel: true
flash_attn: fa2   # requires patch_transformers_fa2_s_aux.py + sm89 wheel (validated 2026-07-07)

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: /home/dfried/exp/adp-smoke/.cache/LLaMA-Factory/examples/deepspeed/ds_z3_config.json

### dataset (pre-built tokenized cache; no tokenization under torchrun)
dataset: paper_openhands_nonweb_train_clean_mm_safe
eval_dataset: paper_openhands_nonweb_eval_clean_mm_safe
dataset_dir: /home/dfried/exp/adp-smoke/datasets/paper_nonweb
template: qwen3_5_nothink
cutoff_len: 32768
overwrite_cache: false
preprocessing_num_workers: 8
dataloader_num_workers: 2
tokenized_path: /home/dfried/exp/adp-smoke/datasets/paper_nonweb/tokenized_qwen35_4b_seq32768

### output (output_dir overridden by sbatch; full checkpoints for cross-job resume)
output_dir: /home/dfried/exp/adp-smoke/runs/paper_nonweb_4b/output
logging_steps: 5
save_steps: 50
save_total_limit: 2
save_only_model: false   # full DS checkpoints (~50GB) so job 2 can truly resume optimizer/scheduler
plot_loss: true
overwrite_output_dir: false
report_to: wandb
run_name: adp-paper-nonweb-4b-4gpu-fa2

### train (1154 steps total at effective batch 32; spans two chained 48h jobs)
per_device_train_batch_size: 1
gradient_accumulation_steps: 8   # 4 GPUs x ga8 = effective batch 32
learning_rate: 1.0e-5
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
fp16: false
gradient_checkpointing: true
ddp_timeout: 180000000

### eval (in-training; safe at 32k via patch_llamafactory_liger_eval_skip_logits.py:
### skip_logits=True on loss-only prediction steps avoids materializing full logits.
### 290-example validation split from the tokenized cache; ~1-2 min/eval on 4 GPUs.)
eval_strategy: steps
eval_steps: 50
per_device_eval_batch_size: 1
prediction_loss_only: true
